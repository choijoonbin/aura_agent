version: "3.9"

services:
  neo4j:
    image: neo4j:5.26
    container_name: auraagent-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j12345
      NEO4J_dbms_security_auth__minimum__password__length: "8"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j12345 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
